<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานผลการนับคะแนนเลือกตั้ง เทศบาลตำบลหนองบัวศาลา</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .syncing-indicator { display: none; }
        .is-syncing .syncing-indicator { display: inline-flex; }
        
        /* Print Styles */
        @media print {
            body { background-color: white !important; }
            header, #mobile-nav, .print\:hidden { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl { box-shadow: none !important; }
            .border-slate-200 { border-color: #e2e8f0 !important; }
            /* Force background colors to print */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .h-\[calc\(100vh-6rem\)\] { height: auto !important; min-height: auto !important; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 flex flex-col">

    <!-- Audio for Dashboard Notification -->
    <audio id="ping-sound" src="https://actions.google.com/sounds/v1/alarms/positive_ding.ogg" preload="auto"></audio>
    
    <!-- Toast Container for Notifications -->
    <div id="toast-container" class="fixed top-20 right-4 lg:right-6 z-[60] flex flex-col gap-3 pointer-events-none print:hidden"></div>

    <!-- Header & Navigation -->
    <header class="bg-white shadow-sm border-b border-slate-200 shrink-0 relative z-40 print:hidden">
        <div class="max-w-[1920px] w-full mx-auto px-2 lg:px-6">
            <div class="flex justify-between items-center h-14 lg:h-16">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-1.5 lg:p-2 rounded-lg text-white shadow-sm relative overflow-hidden">
                        <i class="fa-solid fa-chart-pie text-lg lg:text-xl relative z-10"></i>
                    </div>
                    <span class="font-black text-lg lg:text-xl tracking-tight hidden sm:block text-slate-800">ElectionLive</span>
                    
                    <!-- Cloud Sync Indicator -->
                    <div id="sync-status" class="ml-2 px-2 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold items-center gap-1 shadow-sm syncing-indicator">
                        <i class="fa-solid fa-cloud-arrow-up fa-fade"></i> กำลังซิงค์ข้อมูล...
                    </div>
                </div>
                <nav class="hidden sm:flex space-x-2 items-center" id="desktop-nav"></nav>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="w-full max-w-[1920px] mx-auto px-2 lg:px-6 py-2 lg:py-4 flex-1 flex flex-col min-h-0 relative z-10"></main>

    <!-- Mobile Bottom Nav -->
    <div class="sm:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-safe z-40 shadow-[0_-5px_15px_-10px_rgba(0,0,0,0.1)] print:hidden" id="mobile-nav"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- STATE MANAGEMENT ---
        let state = {
            activeTab: 'dashboard',
            lastUpdated: null,
            currentUser: null,
            isVotingOpen: true, 
            stationLastUpdated: {}, 
            stationSubmitCount: {}, 
            stationClosed: {}, 
            mayorCandidates: [
                { id: 'm1', number: 1, name: 'นาย ผู้สมัครนายก เบอร์หนึ่ง' },
                { id: 'm2', number: 2, name: 'นาย ผู้สมัครนายก เบอร์สอง' },
            ],
            councilCandidates: {
                1: Array.from({ length: 13 }, (_, i) => ({ id: `c1_${i + 1}`, number: i + 1, name: `ผู้สมัคร ส.ท. เขต 1 เบอร์ ${i + 1}` })),
                2: Array.from({ length: 13 }, (_, i) => ({ id: `c2_${i + 1}`, number: i + 1, name: `ผู้สมัคร ส.ท. เขต 2 เบอร์ ${i + 1}` }))
            },
            scores: {}, 
            staffAccounts: {},
            googleSheetUrl: 'https://script.google.com/macros/s/AKfycbylPl9lPMiMQFSM8aX0rws2jwUqdypwP3OY0jbhv7QoyoLT1gARiUgCVWb4YYoeAuqi/exec',
            loginMode: 'staff',
            loginZone: 1,
            loginStation: 1
        };

        // ตัวแปรเก็บค่าร่างที่พิมพ์ค้างไว้ (Auto-Save Draft) ป้องกันแอปดับ
        let draftScores = JSON.parse(localStorage.getItem('electionDraftScoresV9')) || {};

        let timerInterval = null;
        let syncTimeout = null;
        let dashboardInterval = null; 
        let db, auth, appId, mainDocRef;
        let isFirebaseReady = false;
        let isInitialLoad = true;
        let previousUpdateTimes = {}; 
        let previousClosedStatus = {}; 

        // --- TOAST NOTIFICATION SYSTEM ---
        window.showToast = (title, desc, isAlert = false) => {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const borderColor = isAlert ? 'border-rose-500' : 'border-emerald-500';
            const iconColor = isAlert ? 'text-rose-500' : 'text-emerald-500';
            const bgColor = isAlert ? 'bg-rose-50' : 'bg-emerald-50';
            const textColor = isAlert ? 'text-rose-600' : 'text-emerald-600';
            const borderColorInner = isAlert ? 'border-rose-100' : 'border-emerald-100';
            const icon = isAlert ? 'fa-triangle-exclamation' : 'fa-bell';

            toast.className = `bg-white border-l-4 ${borderColor} rounded-xl shadow-2xl p-4 flex items-start gap-3 transform transition-all duration-500 translate-x-full opacity-0 pointer-events-auto min-w-[280px] max-w-[90vw]`;
            toast.innerHTML = `
                <div class="${iconColor} mt-0.5 animate-bounce"><i class="fa-solid ${icon} text-xl sm:text-2xl"></i></div>
                <div class="flex-1 pr-2 min-w-0">
                    <h4 class="text-sm sm:text-base font-black text-slate-800 leading-tight truncate">${title}</h4>
                    <p class="text-xs sm:text-sm font-bold ${textColor} mt-1 ${bgColor} inline-block px-2 py-0.5 rounded-lg border ${borderColorInner} truncate max-w-full">${desc}</p>
                </div>
            `;
            container.appendChild(toast);
            
            const audio = document.getElementById('ping-sound');
            if (audio && !isAlert) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio autoplay blocked', e));
            }

            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 50);
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 8000); 
        };

        window.showStaffAlert = (count, timeStr, isFinal = false) => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-[100] flex items-center justify-center px-4 bg-slate-900/60 backdrop-blur-sm fade-in print:hidden';
            
            let iconHtml = isFinal 
                ? `<div class="w-16 h-16 sm:w-24 sm:h-24 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-4 sm:mb-5 shadow-inner"><i class="fa-solid fa-box-archive text-3xl sm:text-5xl"></i></div>`
                : `<div class="w-16 h-16 sm:w-24 sm:h-24 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 sm:mb-5 shadow-inner"><i class="fa-solid fa-check-double text-3xl sm:text-5xl"></i></div>`;
                
            let titleHtml = isFinal ? "ปิดหีบสำเร็จ!" : "บันทึกสำเร็จ!";
            let descHtml = isFinal 
                ? `<p class="text-slate-600 font-bold mb-1 text-sm sm:text-base">ส่งข้อมูลรอบสุดท้ายเรียบร้อย</p><p class="text-slate-500 text-xs sm:text-sm">ปิดการแก้ไขคะแนนหน่วยนี้แล้ว</p>`
                : `<p class="text-slate-600 font-bold mb-1 text-sm sm:text-base">ส่งข้อมูลการนับครั้งที่ <span class="text-emerald-600 font-black text-xl sm:text-2xl ml-1">${count}</span></p><p class="text-slate-500 text-xs sm:text-sm">เวลาบันทึกล่าสุด <span class="font-bold text-slate-700">${timeStr} น.</span></p>`;

            modal.innerHTML = `
                <div class="bg-white rounded-[2rem] p-6 sm:p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-all duration-300">
                    ${iconHtml}
                    <h3 class="text-2xl sm:text-3xl font-black text-slate-800 mb-3">${titleHtml}</h3>
                    <div class="bg-slate-50 p-3 sm:p-4 rounded-2xl border border-slate-100 mb-5 sm:mb-6">
                        ${descHtml}
                    </div>
                    <button onclick="this.closest('.fixed').remove()" class="w-full ${isFinal ? 'bg-gradient-to-r from-indigo-500 to-indigo-600 border-indigo-800' : 'bg-gradient-to-r from-emerald-500 to-teal-600 border-teal-800'} text-white font-bold py-3 sm:py-4 px-4 rounded-xl transition-all active:scale-95 shadow-md border-b-4 text-base sm:text-lg">
                        ตกลง
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => modal.querySelector('div').classList.replace('scale-95', 'scale-100'), 10);
        };

        window.showConfirmModal = (title, message, confirmText, confirmClass, onConfirm) => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-[100] flex items-center justify-center px-4 bg-slate-900/60 backdrop-blur-sm fade-in print:hidden';
            modal.innerHTML = `
                <div class="bg-white rounded-[2rem] p-6 sm:p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-all duration-300">
                    <div class="w-16 h-16 sm:w-20 sm:h-20 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 sm:mb-5 shadow-inner">
                        <i class="fa-solid fa-triangle-exclamation text-3xl sm:text-4xl"></i>
                    </div>
                    <h3 class="text-xl sm:text-2xl font-black text-slate-800 mb-2 sm:mb-3">${title}</h3>
                    <p class="text-slate-500 mb-5 sm:mb-6 text-xs sm:text-sm">${message}</p>
                    <div class="flex gap-2 sm:gap-3">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 sm:py-3 rounded-xl transition-all text-sm sm:text-base">ยกเลิก</button>
                        <button id="btn-confirm-action" class="flex-1 ${confirmClass} text-white font-bold py-2 sm:py-3 rounded-xl transition-all shadow-md text-sm sm:text-base">${confirmText}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => modal.querySelector('div').classList.replace('scale-95', 'scale-100'), 10);
            
            document.getElementById('btn-confirm-action').onclick = () => {
                modal.remove();
                onConfirm();
            };
        };

        // --- LOAD DATA & FIREBASE ---
        function loadLocalData() {
            try {
                const saved = localStorage.getItem('electionNongBuaSalaDataV9');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.mayorCandidates = parsed.mayorCandidates || state.mayorCandidates;
                    state.councilCandidates = parsed.councilCandidates || state.councilCandidates;
                    state.scores = parsed.scores || {};
                    state.lastUpdated = parsed.lastUpdated || null;
                    state.isVotingOpen = parsed.isVotingOpen !== undefined ? parsed.isVotingOpen : true;
                    state.stationLastUpdated = parsed.stationLastUpdated || {};
                    state.stationSubmitCount = parsed.stationSubmitCount || {};
                    state.stationClosed = parsed.stationClosed || {};
                    state.staffAccounts = parsed.staffAccounts || {};
                    state.googleSheetUrl = parsed.googleSheetUrl || 'https://script.google.com/macros/s/AKfycbylPl9lPMiMQFSM8aX0rws2jwUqdypwP3OY0jbhv7QoyoLT1gARiUgCVWb4YYoeAuqi/exec';
                    previousUpdateTimes = { ...state.stationLastUpdated };
                    previousClosedStatus = { ...state.stationClosed };
                }
            } catch (e) {}
        }

        function triggerNotifsAndMerge(parsed) {
            let newlyUpdated = [];
            let newlyClosed = [];
            
            for (const key in parsed.stationLastUpdated) {
                if (previousUpdateTimes[key] && parsed.stationLastUpdated[key] > previousUpdateTimes[key]) {
                    newlyUpdated.push(key);
                }
                previousUpdateTimes[key] = parsed.stationLastUpdated[key];
            }

            for (const key in parsed.stationClosed) {
                if (!previousClosedStatus[key] && parsed.stationClosed[key]) {
                    newlyClosed.push(key);
                }
                previousClosedStatus[key] = parsed.stationClosed[key];
            }
            
            if (!isInitialLoad && (state.activeTab === 'dashboard' || state.activeTab === 'status' || state.activeTab === 'settings')) {
                newlyClosed.forEach(key => {
                    const [z, s] = key.split('_');
                    window.showToast('ปิดหีบเรียบร้อย!', `หน่วยเลือกตั้งที่ ${s} (เขต ${z}) นับเสร็จสิ้น`, false); 
                });

                newlyUpdated.forEach(key => {
                    if (!newlyClosed.includes(key)) { 
                        const [z, s] = key.split('_');
                        window.showToast('อัปเดตคะแนนใหม่!', `หน่วยเลือกตั้งที่ ${s} (เขต ${z})`);
                    }
                });
            }

            state.mayorCandidates = parsed.mayorCandidates || state.mayorCandidates;
            state.councilCandidates = parsed.councilCandidates || state.councilCandidates;
            state.scores = parsed.scores || {};
            state.lastUpdated = parsed.lastUpdated || state.lastUpdated;
            state.isVotingOpen = parsed.isVotingOpen !== undefined ? parsed.isVotingOpen : true;
            state.stationLastUpdated = parsed.stationLastUpdated || {};
            state.stationSubmitCount = parsed.stationSubmitCount || {};
            state.stationClosed = parsed.stationClosed || {};
            state.staffAccounts = parsed.staffAccounts || state.staffAccounts;
            state.googleSheetUrl = parsed.googleSheetUrl || 'https://script.google.com/macros/s/AKfycbylPl9lPMiMQFSM8aX0rws2jwUqdypwP3OY0jbhv7QoyoLT1gARiUgCVWb4YYoeAuqi/exec';
        }

        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            if (firebaseConfig) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                mainDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'election_db', 'main_state');

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        isFirebaseReady = true;
                        onSnapshot(mainDocRef, (snapshot) => {
                            if (snapshot.exists() && !document.body.classList.contains('is-syncing')) {
                                triggerNotifsAndMerge(snapshot.data());
                                if (state.activeTab === 'dashboard' || state.activeTab === 'status' || isInitialLoad) renderApp();
                                isInitialLoad = false;
                            } else if (!snapshot.exists()) {
                                isInitialLoad = false;
                            }
                        }, (error) => console.error("Firestore Listen Error:", error));
                    }
                });
            } else { loadLocalData(); }
        } catch (e) { loadLocalData(); }

        // --- GOOGLE SHEET SYNC ---
        async function fetchFromGoogleSheet() {
            if (!state.googleSheetUrl) return false;
            try {
                const response = await fetch(state.googleSheetUrl + '?action=load');
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    const parsed = typeof result.data === 'string' ? JSON.parse(result.data) : result.data;
                    triggerNotifsAndMerge(parsed);
                    if (state.activeTab === 'dashboard' || state.activeTab === 'status') renderApp();
                    return true;
                }
            } catch (err) {}
            return false;
        }

        function triggerAutoSync() {
            if (!state.googleSheetUrl) return;
            if (syncTimeout) clearTimeout(syncTimeout);
            document.body.classList.add('is-syncing');
            syncTimeout = setTimeout(async () => {
                try {
                    const payload = { action: 'save', state: JSON.stringify(state) };
                    await fetch(state.googleSheetUrl, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload) 
                    });
                } catch(e) { } finally { document.body.classList.remove('is-syncing'); }
            }, 1500); 
        }

        // --- SAVE DATA (Admin / Global) ---
        function saveData() {
            if (isFirebaseReady) {
                setDoc(mainDocRef, { ...state }, { merge: true }).catch(e => console.error(e));
            }
            localStorage.setItem('electionNongBuaSalaDataV9', JSON.stringify(state));
            triggerAutoSync();
        }

        function initDefaultStaff() {
            let changed = false;
            [1, 2].forEach(zone => {
                getStationsForZone(zone).forEach(s => {
                    const key = `${zone}_${s}`;
                    if (!state.staffAccounts[key]) {
                        state.staffAccounts[key] = { name: `เจ้าหน้าที่ประจำหน่วย ${s}`, pin: "1234" };
                        changed = true;
                    }
                });
            });
            if (changed) saveData();
        }

        // --- HELPERS ---
        // ปรับปรุง: ให้เขต 2 คืนค่าหน่วยเป็น 1-17
        function getStationsForZone(zone) {
            if (zone === 1) return Array.from({ length: 13 }, (_, i) => i + 1);
            if (zone === 2) return Array.from({ length: 17 }, (_, i) => i + 1); // เปลี่ยนจาก i + 14 เป็น i + 1
            return [];
        }

        function getTotalScore(candidateId) {
            let total = 0;
            for (const [key, value] of Object.entries(state.scores)) {
                if (key.includes(`_candidate_${candidateId}`)) total += parseInt(value || 0);
            }
            return total;
        }

        // ปรับปรุง: การอ้างอิงรหัสคะแนน ให้ผูกกับทั้ง zone และ station เสมอ (ป้องกันการบันทึกชนกันระหว่างเขต 1 และ 2)
        function getSpecialScore(category, type, zone) {
            let total = 0;
            const zonesToProcess = zone === 0 ? [1, 2] : [zone];
            zonesToProcess.forEach(z => {
                getStationsForZone(z).forEach(s => { 
                    total += parseInt(state.scores[`z${z}_s${s}_${category}_${type}`] || 0); 
                });
            });
            return total;
        }

        function getCandidateScoreByZone(candidateId, zone) {
            let total = 0;
            getStationsForZone(zone).forEach(s => { 
                total += parseInt(state.scores[`z${zone}_s${s}_candidate_${candidateId}`] || 0); 
            });
            return total;
        }

        function getStationMayorStats(zone, station) {
            let valid = 0;
            state.mayorCandidates.forEach(c => {
                valid += parseInt(state.scores[`z${zone}_s${station}_candidate_${c.id}`] || 0);
            });
            const invalid = parseInt(state.scores[`z${zone}_s${station}_mayor_invalid`] || 0);
            const novote = parseInt(state.scores[`z${zone}_s${station}_mayor_novote`] || 0);
            const eligible = parseInt(state.scores[`z${zone}_s${station}_eligible`] || 0);
            const turnout = valid + invalid + novote;
            return { valid, invalid, novote, turnout, eligible };
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (state.activeTab === 'input' && state.currentUser?.role === 'staff' && state.isVotingOpen) updateTimerUI();
            }, 1000);
        }

        function updateTimerUI() {
            const timerEl = document.getElementById('staff-timer-display');
            if (!timerEl || !state.isVotingOpen) return;
            const { zone, station } = state.currentUser;
            const key = `${zone}_${station}`;
            if (state.stationClosed[key]) return; 

            const lastTime = state.stationLastUpdated[key];
            if (!lastTime) {
                timerEl.innerHTML = `<div class="bg-amber-100 border border-amber-300 text-amber-800 p-2 sm:p-3 rounded-lg sm:rounded-xl font-bold flex items-center justify-center gap-1.5 sm:gap-2 text-xs sm:text-base animate-pulse"><i class="fa-solid fa-play"></i> ยังไม่มีการรายงานผล กรุณารายงานทันที!</div>`;
                return;
            }
            const elapsed = Date.now() - lastTime;
            const remaining = (10 * 60 * 1000) - elapsed;
            if (remaining <= 0) {
                timerEl.innerHTML = `<div class="bg-red-500 border border-red-600 text-white p-2 sm:p-3 rounded-lg sm:rounded-xl font-bold flex items-center justify-center gap-1.5 sm:gap-2 text-xs sm:text-base animate-pulse shadow-md"><i class="fa-solid fa-bell text-lg sm:text-2xl animate-bounce"></i> <span>เลยเวลารายงานผล กรุณาอัปเดตทันที</span></div>`;
            } else {
                const mins = Math.floor(remaining / 60000);
                const secs = Math.floor((remaining % 60000) / 1000);
                timerEl.innerHTML = `<div class="bg-emerald-50 border border-emerald-200 text-emerald-700 p-2 sm:p-3 rounded-lg sm:rounded-xl font-medium flex items-center justify-center gap-1.5 sm:gap-2 text-xs sm:text-base"><i class="fa-regular fa-clock"></i> รายงานผลรอบถัดไป: <span class="font-bold text-sm sm:text-lg w-10 sm:w-12 text-center">${mins}:${secs.toString().padStart(2, '0')}</span> นาที</div>`;
            }
        }

        function startDashboardTimer() {
            if (dashboardInterval) clearInterval(dashboardInterval);
            dashboardInterval = setInterval(() => {
                if (state.activeTab === 'dashboard' || state.activeTab === 'status') fetchFromGoogleSheet();
            }, 5000);
        }

        // --- NEW: AUTO-SAVE DRAFT ---
        window.handleDraftInput = (inputId, value) => {
            draftScores[inputId] = value;
            localStorage.setItem('electionDraftScoresV9', JSON.stringify(draftScores));
        };

        // --- WINDOW EVENTS ---
        window.changeTab = (tab) => { 
            if (tab === 'input' && state.currentUser?.role === 'staff') {

        // --- ATOMIC SAVE DATA (For Staff Concurrency) ---
        window.executeSaveStaffScores = async (isFinal) => {
            if (!state.isVotingOpen) return; 

            const { zone, station } = state.currentUser;
            const stationKey = `${zone}_${station}`;
            
            const btnSave = document.getElementById('btn-save-staff');
            const btnClose = document.getElementById('btn-close-station');
            if(btnSave) { btnSave.disabled = true; btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> บันทึก...'; }
            if(btnClose) { btnClose.disabled = true; }

            // 1. Prepare data updates specifically for this station using unique zone+station key
            let updates = {};
            const eligible = parseInt(document.getElementById('input_eligible')?.value || 0);
            updates[`scores.z${zone}_s${station}_eligible`] = eligible;
            state.scores[`z${zone}_s${station}_eligible`] = eligible;

            state.mayorCandidates.forEach(c => { 
                let v = parseInt(document.getElementById(`input_m_${c.id}`)?.value || 0);
                updates[`scores.z${zone}_s${station}_candidate_${c.id}`] = v; 
                state.scores[`z${zone}_s${station}_candidate_${c.id}`] = v;
            });
            state.councilCandidates[zone].forEach(c => { 
                let v = parseInt(document.getElementById(`input_c_${c.id}`)?.value || 0);
                updates[`scores.z${zone}_s${station}_candidate_${c.id}`] = v; 
                state.scores[`z${zone}_s${station}_candidate_${c.id}`] = v;
            });

            ['mayor_novote', 'mayor_invalid', 'council_novote', 'council_invalid'].forEach(f => {
                let v = parseInt(document.getElementById(`input_${f.charAt(0)}_${f.split('_')[1]}`)?.value || 0);
                updates[`scores.z${zone}_s${station}_${f}`] = v;
                state.scores[`z${zone}_s${station}_${f}`] = v;
            });
            
            const nowMs = Date.now();
            const nowTime = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            const lastUpdatedStr = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }) + ' ' + nowTime;

            updates[`stationLastUpdated.${stationKey}`] = nowMs;
            state.stationLastUpdated[stationKey] = nowMs;
            previousUpdateTimes[stationKey] = nowMs;
            
            const newCount = (state.stationSubmitCount[stationKey] || 0) + 1;
            updates[`stationSubmitCount.${stationKey}`] = newCount;
            state.stationSubmitCount[stationKey] = newCount;
            
            if (isFinal) {
                updates[`stationClosed.${stationKey}`] = true;
                state.stationClosed[stationKey] = true;
                previousClosedStatus[stationKey] = true;
            }

            updates['lastUpdated'] = lastUpdatedStr;
            state.lastUpdated = lastUpdatedStr;

            // 2. Perform Atomic Update to Firebase (This prevents data collisions perfectly)
            if (isFirebaseReady) {
                try {
                    await updateDoc(mainDocRef, updates);
                } catch (e) {
                    await setDoc(mainDocRef, { ...state }, { merge: true });

            draftScores = {};

                getStationsForZone(zone).forEach(s => {
                    const key = `${zone}_${s}`;
                    const lastUpd = state.stationLastUpdated[key];
                    const isClosed = state.stationClosed[key];
                    const submitCount = state.stationSubmitCount[key] || 0;
                    
                    if (isClosed) {
                        const stats = getStationMayorStats(zone, s); 
                        const turnoutPercent = stats.eligible > 0 ? ((stats.turnout / stats.eligible) * 100).toFixed(1) : "0.0";
                        
                        html += `

                                    <div class="flex justify-between"><span class="text-slate-500">มาใช้สิทธิ์</span> <span class="font-bold text-indigo-600">${stats.turnout.toLocaleString()}</span></div>

                                    <div class="flex justify-between"><span class="text-slate-500">ไม่ประสงค์</span> <span class="font-bold text-slate-600">${stats.novote.toLocaleString()}</span></div>

            <div class="fixed sm:sticky bottom-16 sm:bottom-4 pb-safe sm:pb-0 pt-3 sm:pt-4 z-30 flex flex-col sm:flex-row gap-2 sm:gap-3 bg-white sm:bg-transparent -mx-4 px-4 sm:mx-0 sm:px-0 left-0 w-full sm:w-auto shadow-[0_-5px_15px_-10px_rgba(0,0,0,0.1)] sm:shadow-none border-t border-slate-200 sm:border-none items-center">
                <button id="btn-close-station" onclick="saveStaffScores(true)" class="w-full sm:w-1/3 bg-rose-500 hover:bg-rose-600 text-white font-bold py-2.5 sm:py-3 px-3 rounded-lg sm:rounded-xl shadow-sm flex items-center justify-center gap-1.5 transition-transform active:scale-95 text-xs sm:text-sm border-b-[3px] border-rose-700 order-2 sm:order-1 opacity-90 hover:opacity-100"><i class="fa-solid fa-lock"></i> ปิดหีบและส่งผลคะแนน</button>
                <button id="btn-save-staff" onclick="saveStaffScores(false)" class="w-full sm:flex-1 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-black py-3 sm:py-4 md:py-5 px-4 rounded-xl sm:rounded-2xl shadow-[0_10px_20px_-10px_rgba(16,185,129,0.5)] flex items-center justify-center gap-2 transition-transform active:scale-95 text-base sm:text-lg md:text-xl border-b-4 border-teal-800 order-1 sm:order-2"><i class="fa-solid fa-save text-lg sm:text-xl"></i> บันทึกชั่วคราว</button>
            </div>
            </div></div></div>`;
            return html;
        }

        function renderSettings() {
            let html = `<div class="max-w-5xl mx-auto space-y-6 fade-in mt-4 sm:mt-8 px-4 sm:px-0"><div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-4 sm:p-5 md:p-8"><div class="flex items-center gap-3 sm:gap-4 mb-5 sm:mb-6 md:mb-8 border-b border-slate-100 pb-4 sm:pb-5 md:pb-6"><div class="bg-slate-800 p-2.5 sm:p-3 md:p-4 rounded-xl sm:rounded-2xl text-white shadow-sm"><i class="fa-solid fa-users-gear text-lg sm:text-xl md:text-2xl"></i></div><div><h2 class="text-xl sm:text-2xl md:text-3xl font-bold text-slate-800">ตั้งค่าระบบ (Admin)</h2><p class="text-slate-500 font-medium mt-0.5 sm:mt-1 text-xs sm:text-sm md:text-base">จัดการรายชื่อ ข้อมูลบัญชี และการควบคุม</p></div></div><div class="space-y-6 sm:space-y-10">`;
            
            html += `
                <section class="bg-rose-50 p-4 sm:p-5 md:p-6 rounded-2xl sm:rounded-3xl border border-rose-200 shadow-sm">
                    <h3 class="text-lg sm:text-xl md:text-2xl font-bold text-rose-700 mb-3 sm:mb-4 flex items-center gap-2 sm:gap-3">
                        <i class="fa-solid fa-power-off"></i> ควบคุมระบบ
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                        <div class="bg-white p-3 sm:p-4 rounded-xl border border-rose-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-0">
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm sm:text-base">สถานะระบบรับคะแนน</h4>
                                <p class="text-[10px] sm:text-[11px] text-slate-500 mt-0.5 sm:mt-1">เปิด/ปิด ไม่ให้เจ้าหน้าที่ส่งข้อมูล</p>
                            </div>
                            <button onclick="toggleVotingStatus()" class="px-3 sm:px-4 py-2 rounded-lg font-bold text-xs sm:text-sm shadow-sm transition-all ${state.isVotingOpen ? 'bg-emerald-500 hover:bg-emerald-600 text-white' : 'bg-slate-200 hover:bg-slate-300 text-slate-600'}">
                                ${state.isVotingOpen ? '<i class="fa-solid fa-lock-open mr-1"></i> ระบบเปิดอยู่' : '<i class="fa-solid fa-lock mr-1"></i> ระบบปิดอยู่'}
                            </button>
                        </div>
                        <div class="bg-white p-3 sm:p-4 rounded-xl border border-rose-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-0">
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm sm:text-base">ล้างข้อมูลคะแนนทั้งหมด</h4>
                                <p class="text-[10px] sm:text-[11px] text-slate-500 mt-0.5 sm:mt-1">รีเซ็ตคะแนนและสถานะปิดหีบ</p>
                            </div>
                            <button onclick="clearVotingData()" class="px-3 sm:px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg font-bold text-xs sm:text-sm shadow-sm transition-all">
                                <i class="fa-solid fa-trash-can mr-1"></i> ล้างคะแนน
                            </button>
                        </div>
                    </div>
                </section>
            `;

            html += `<section class="bg-green-50/50 p-4 sm:p-5 md:p-6 rounded-2xl sm:rounded-3xl border border-green-200"><h3 class="text-lg sm:text-xl md:text-2xl font-bold text-green-700 mb-2 sm:mb-4 flex items-center gap-2 sm:gap-3"><i class="fa-solid fa-database"></i> ฐานข้อมูล Google Sheet</h3><p class="text-xs sm:text-sm text-green-700 mb-3 sm:mb-4">ระบบจะทำการ <b>"บันทึกข้อมูลอัตโนมัติ"</b> ลง Google Sheet ทุกครั้งที่มีการแก้ไขคะแนนหรือตั้งค่า</p><div class="space-y-3 sm:space-y-4"><div><label class="text-xs sm:text-sm font-bold text-slate-700 mb-1 block">Google Web App URL</label><input type="text" value="${state.googleSheetUrl || ''}" oninput="updateGoogleSheetUrl(this.value)" class="w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg sm:rounded-xl font-medium focus:ring-2 focus:ring-green-500 focus:outline-none text-sm" placeholder="https://script.google.com/macros/s/.../exec" /></div><button id="btn-sync-sheet" onclick="syncToGoogleSheet()" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 sm:py-3 px-4 sm:px-6 rounded-lg sm:rounded-xl shadow-md transition-all flex items-center justify-center gap-2 text-sm sm:text-base"><i class="fa-solid fa-cloud-arrow-up"></i> บังคับบันทึกข้อมูลไปชีตทันที</button></div></section>`;
            html += `<section class="bg-slate-50 p-4 sm:p-5 md:p-6 rounded-2xl sm:rounded-3xl border border-slate-200"><h3 class="text-lg sm:text-xl md:text-2xl font-bold text-slate-800 mb-4 sm:mb-6 flex items-center gap-2 sm:gap-3"><i class="fa-solid fa-user-lock"></i> บัญชีเจ้าหน้าที่ประจำหน่วย</h3><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">`;
            [1, 2].forEach(zone => {
                getStationsForZone(zone).forEach(s => {
                    const key = `${zone}_${s}`;
                    const acc = state.staffAccounts[key] || { name: '', pin: '' };
                    html += `<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 sm:p-4 relative"><div class="absolute top-0 right-0 bg-slate-800 text-white text-[8px] sm:text-[10px] font-bold px-1.5 sm:px-2 py-0.5 sm:py-1 rounded-bl-lg rounded-tr-xl">หน่วย ${s} (เขต ${zone})</div><div class="mt-2 sm:mt-3 space-y-1.5 sm:space-y-2"><div><label class="text-[10px] sm:text-xs font-bold text-slate-500 mb-0.5 sm:mb-1 block">ชื่อผู้ดูแล</label><input type="text" value="${acc.name}" oninput="updateStaffSetting('${key}', 'name', this.value)" class="w-full p-1.5 sm:p-2 border border-slate-300 rounded-md sm:rounded-lg text-xs sm:text-sm font-medium focus:ring-2 focus:ring-slate-500 focus:outline-none" /></div><div><label class="text-[10px] sm:text-xs font-bold text-slate-500 mb-0.5 sm:mb-1 block">รหัสผ่าน</label><input type="text" value="${acc.pin}" oninput="updateStaffSetting('${key}', 'pin', this.value)" class="w-full p-1.5 sm:p-2 border border-slate-300 rounded-md sm:rounded-lg text-xs sm:text-sm font-bold tracking-widest text-slate-700 focus:ring-2 focus:ring-slate-500 focus:outline-none" /></div></div></div>`;
                });
            });
            html += `</div></section><section class="bg-amber-50/50 p-4 sm:p-5 md:p-6 rounded-2xl sm:rounded-3xl border border-amber-100/50"><h3 class="text-lg sm:text-xl md:text-2xl font-bold text-amber-700 mb-4 sm:mb-6 flex items-center gap-2 sm:gap-3"><i class="fa-solid fa-medal"></i> นายกเทศมนตรี</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-5">`;
            state.mayorCandidates.forEach(c => { html += `<div class="flex flex-col gap-0 bg-white rounded-xl shadow-sm border border-amber-200 overflow-hidden focus-within:ring-2 focus-within:ring-amber-400 focus-within:border-amber-400 transition-all"><label class="text-[10px] sm:text-xs md:text-sm font-bold text-amber-800 bg-amber-100 px-3 sm:px-4 py-1.5 sm:py-2 border-b border-amber-200 flex justify-between items-center"><span>เบอร์ ${c.number}</span><i class="fa-solid fa-pen text-amber-600/50 text-[8px] sm:text-[10px]"></i></label><input type="text" value="${c.name}" oninput="updateCandidateName('mayor', '${c.id}', this.value)" class="p-2 sm:p-3 md:p-4 border-none focus:outline-none font-semibold text-slate-700 text-sm sm:text-base md:text-lg" /></div>`; });
            html += `</div></section><section class="bg-blue-50/50 p-4 sm:p-5 md:p-6 rounded-2xl sm:rounded-3xl border border-blue-100/50"><h3 class="text-lg sm:text-xl md:text-2xl font-bold text-blue-700 mb-4 sm:mb-6 flex items-center gap-2 sm:gap-3"><i class="fa-solid fa-users"></i> ส.ท. เขต 1</h3><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4 md:gap-5">`;
            state.councilCandidates[1].forEach(c => { html += `<div class="flex flex-col gap-0 bg-white rounded-xl shadow-sm border border-blue-200 overflow-hidden focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-blue-400 transition-all"><label class="text-[8px] sm:text-[10px] md:text-xs font-bold text-blue-800 bg-blue-100 px-2 sm:px-3 py-1 sm:py-2 border-b border-blue-200 flex justify-between items-center"><span>เบอร์ ${c.number}</span><i class="fa-solid fa-pen text-blue-600/50 text-[8px] sm:text-[10px]"></i></label><input type="text" value="${c.name}" oninput="updateCandidateName('council', '${c.id}', this.value, 1)" class="p-2 sm:p-2.5 md:p-3 border-none focus:outline-none font-medium text-slate-700 text-xs sm:text-sm md:text-base" /></div>`; });
            html += `</div></section><section class="bg-emerald-50/50 p-4 sm:p-5 md:p-6 rounded-2xl sm:rounded-3xl border border-emerald-100/50"><h3 class="text-lg sm:text-xl md:text-2xl font-bold text-emerald-700 mb-4 sm:mb-6 flex items-center gap-2 sm:gap-3"><i class="fa-solid fa-users"></i> ส.ท. เขต 2</h3><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4 md:gap-5">`;
            state.councilCandidates[2].forEach(c => { html += `<div class="flex flex-col gap-0 bg-white rounded-xl shadow-sm border border-emerald-200 overflow-hidden focus-within:ring-2 focus-within:ring-emerald-400 focus-within:border-emerald-400 transition-all"><label class="text-[8px] sm:text-[10px] md:text-xs font-bold text-emerald-800 bg-emerald-100 px-2 sm:px-3 py-1 sm:py-2 border-b border-emerald-200 flex justify-between items-center"><span>เบอร์ ${c.number}</span><i class="fa-solid fa-pen text-emerald-600/50 text-[8px] sm:text-[10px]"></i></label><input type="text" value="${c.name}" oninput="updateCandidateName('council', '${c.id}', this.value, 2)" class="p-2 sm:p-2.5 md:p-3 border-none focus:outline-none font-medium text-slate-700 text-xs sm:text-sm md:text-base" /></div>`; });
            return html + `</div></section></div></div></div>`;
        }

        function renderApp() {
            renderNav();
            const mainContent = document.getElementById('main-content');
            if (state.activeTab === 'dashboard') mainContent.innerHTML = renderDashboard();
            else if (state.activeTab === 'login') mainContent.innerHTML = renderLogin();
            else if (state.activeTab === 'staffInit' && state.currentUser?.role === 'staff') mainContent.innerHTML = renderStaffInit();
            else if (state.activeTab === 'input' && state.currentUser?.role === 'staff') { mainContent.innerHTML = renderStaffInput(); updateTimerUI(); }
            else if (state.activeTab === 'status' && state.currentUser?.role === 'admin') mainContent.innerHTML = renderStatus();
            else if (state.activeTab === 'settings' && state.currentUser?.role === 'admin') mainContent.innerHTML = renderSettings();
            else { state.activeTab = 'dashboard'; mainContent.innerHTML = renderDashboard(); }
        }

        window.onload = async () => {
            loadLocalData();
            await fetchFromGoogleSheet();
            if (Object.keys(state.staffAccounts).length === 0) {
                initDefaultStaff();
            }
            if (state.currentUser && state.activeTab === 'login') {
                if (state.currentUser.role === 'admin') state.activeTab = 'status';
                else {
                    const sKey = `z${state.currentUser.zone}_s${state.currentUser.station}_eligible`;
                    state.activeTab = (state.scores[sKey] === undefined) ? 'staffInit' : 'input';
                }
            }
            if (!state.currentUser && (state.activeTab === 'input' || state.activeTab === 'status' || state.activeTab === 'settings' || state.activeTab === 'staffInit')) state.activeTab = 'login';
            renderApp();
            if (state.activeTab === 'input' && state.currentUser?.role === 'staff') startTimer();
            if ((state.activeTab === 'dashboard' || state.activeTab === 'status') && (!dashboardInterval)) startDashboardTimer();
        };

    </script>
</body>
</html>
